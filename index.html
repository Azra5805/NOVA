    <script>
        function timeAgo(dateString) {
            if (!dateString) return "JUST NOW";

            const date = new Date(dateString);
            const now = new Date();
            const seconds = Math.floor((now - date) / 1000);
            const minutes = Math.floor(seconds / 60);
            const hours = Math.floor(minutes / 60);
            const days = Math.floor(hours / 24);

            if (seconds < 60) return "JUST NOW";
            if (minutes < 60) return `${minutes} MINUTES AGO`;
            if (hours < 24) return `${hours} HOURS AGO`;
            if (days < 7) return `${days} DAYS AGO`;

            // 7 günden eskiyse normal tarih göster
            return date.toLocaleDateString();
        }
        document.addEventListener('DOMContentLoaded', () => {
            // 1. Hafızadan yeni atılan storyleri çek
            const localStories = JSON.parse(localStorage.getItem('stories_db')) || [];

            const storyBar = document.getElementById('story-bar');

            if (storyBar && localStories.length > 0) {

                localStories.reverse().forEach(story => {

                    if (typeof storyDatabase !== 'undefined') {
                        // BURASI ARTIK 'story.id' (Eskiden post.id yazıyordu)
                        storyDatabase[story.id] = {
                            storyImg: story.img,
                            profileImg: story.user.pic,
                            username: story.user.name,
                            profileUrl: "profil.html"
                        };
                    }

                    // B) HTML Kutusunu oluştur
                    const newStoryHTML = `
                    <div class="status-card" onclick="openStory('${story.id}')">
                        <div class="status-pic">
                            <img src="${story.user.pic}" onerror="this.src='asset/image/5.jpg'">
                        </div>
                        <p class="username">${story.user.name}</p>
                    </div>
                    `;

                    // C) Bara Ekle: "Add Story" butonunun hemen sağına
                    const addStoryBtn = storyBar.firstElementChild;
                    if (addStoryBtn) {
                        addStoryBtn.insertAdjacentHTML('afterend', newStoryHTML);
                    } else {
                        storyBar.innerHTML += newStoryHTML;
                    }

            }
        });

        // --- LOGIN UI İŞLEMLERİ ---

        function openLogin() {
            document.getElementById('login-modal').style.display = 'flex';
            document.getElementById('login-error').style.display = 'none';
        }

        function closeLogin() {
            document.getElementById('login-modal').style.display = 'none';

        // Run when form is submitted
        async function handleLogin(event) {
            event.preventDefault(); // Prevent page refresh

            const userVal = document.getElementById('login-username').value;
            const passVal = document.getElementById('login-password').value;
            const errorMsg = document.getElementById('login-error');

            if (userVal.length < 3) {
                errorMsg.innerText = "Username is too short!";
                errorMsg.style.display = "block";
                return;
            }

            // Call the service
            const success = await AuthService.login(userVal, passVal);

            if (success) {
                alert("Login Successful! Welcome " + userVal);
                closeLogin();

                // Reload the page so new profile photo and name appear
                window.location.reload();
            } else {
                errorMsg.innerText = "Login failed!";
                errorMsg.style.display = "block";
            }
        }

        window.onclick = function (event) {

                    };

                // B) HTML Şablonunu Senin Tasarımınla Birebir Oluştur

        document.addEventListener('DOMContentLoaded', () => {
            renderFeed(); // Load posts on page load
        });

        // --- 1. RENDER POSTS ---
        function renderFeed() {
            const feedContainer = document.getElementById('feed-container');

            // Fetch data from LocalStorage
            const posts = JSON.parse(localStorage.getItem('posts_db')) || [];
            const savedList = JSON.parse(localStorage.getItem('saved_db')) || [];

            // If no posts exist
            if (posts.length === 0) {
                feedContainer.innerHTML = `<div style="text-align:center; padding:40px; color:#8e8e8e;">No posts yet.</div>`;
                return;
            }

            feedContainer.innerHTML = ""; // Clear container

            posts.forEach(post => {
                // Check if Liked
                const isLiked = post.likesList && post.likesList.includes('me');
                const likeClass = isLiked ? "fa-solid" : "fa-regular";
                const likeColor = isLiked ? "red" : "inherit";

                // Check if Saved
                const isSaved = savedList.includes(post.id);
                const saveClass = isSaved ? "fa-solid" : "fa-regular";

                // Prepare Comments (Show last 2)
                let commentsHTML = "";
                if (post.comments && post.comments.length > 0) {
                    post.comments.slice(-2).forEach(c => {
                        commentsHTML += `
                <div style="margin-bottom: 4px; font-size: 14px;">
                    <span style="font-weight: 600; margin-right: 5px;">${c.user}</span>${c.text}
                </div>`;
                    });
                }

                // Create HTML Template
                const postHTML = `
        <div class="post" id="post-${post.id}" style="background:white; border:1px solid #dbdbdb; border-radius:8px; margin-bottom:15px;">
            <div class="post-header" style="display:flex; align-items:center; padding:10px;">
                <img src="${post.user.pic}" style="width:32px; height:32px; border-radius:50%; margin-right:10px; object-fit:cover;" onerror="this.src='asset/image/5.jpg'">
                <span style="font-weight:600; font-size:14px;">${post.user.name}</span>
                
                <i class="fa-solid fa-ellipsis" onclick="deletePost('${post.id}')" style="margin-left:auto; cursor:pointer;" title="Delete Post"></i>
            </div>

            <div class="post-img" ondblclick="toggleLike('${post.id}')" style="cursor:pointer;">
                <img src="${post.img}" style="width:100%; display:block;">
            </div>

            <div class="post-content" style="padding:10px;">
                <div style="display:flex; justify-content:space-between; font-size:24px; margin-bottom:10px;">
                    <div style="display:flex; gap:15px;">
                        <i class="${likeClass} fa-heart" onclick="toggleLike('${post.id}')" style="color:${likeColor}; cursor:pointer;"></i>
                        <i class="fa-regular fa-comment" onclick="focusComment('${post.id}')" style="cursor:pointer;"></i>
                        <i class="fa-regular fa-paper-plane" onclick="sharePost('${post.id}')" style="cursor:pointer;"></i>
                    </div>
                    <div>
                        <i class="${saveClass} fa-bookmark" onclick="toggleSave('${post.id}')" style="cursor:pointer;"></i>
                    </div>
                </div>

                <div style="font-weight:600; font-size:14px; margin-bottom:5px;">
                    ${post.likes || 0} likes
                </div>

                <div style="font-size:14px; margin-bottom:5px;">
                    <span style="font-weight:600; margin-right:5px;">${post.user.name}</span>
                    ${post.desc}
                </div>

                <div id="comments-area-${post.id}">
                    ${commentsHTML}
                </div>
                
                <div style="color:#8e8e8e; font-size:10px; margin-top:5px; text-transform:uppercase;">JUST NOW</div>

                <div style="border-top:1px solid #efefef; margin-top:10px; padding-top:10px; display:flex;">
                    <input type="text" id="input-${post.id}" placeholder="Add a comment..." style="border:none; width:100%; outline:none; font-size:14px;">
                    <button onclick="addComment('${post.id}')" style="border:none; background:none; color:#0095f6; font-weight:600; cursor:pointer;">Post</button>
                </div>
            </div>
        </div>`;

                feedContainer.insertAdjacentHTML('afterbegin', postHTML);
            });
        }

        // --- 2. DELETE FUNCTION (NEW) ---
        // index.html içindeki deletePost fonksiyonunu bununla değiştir:
        window.deletePost = function (postId) {
            if (confirm("Bu gönderiyi silmek istediğine emin misin?")) {
                // 1. Postları çek
                let posts = JSON.parse(localStorage.getItem('posts_db')) || [];

                // 2. Silinecek post hariç diğerlerini filtrele
                let newPosts = posts.filter(post => post.id !== postId);

                // 3. Eğer sayı değişmediyse (ID bulunamadıysa) hata vermesin diye kontrol
                if (posts.length === newPosts.length) {
                    console.log("Silinecek ID bulunamadı, tip uyuşmazlığı olabilir.");
                    // ID string/number karışmış olabilir, bir de öyle deneyelim
                    newPosts = posts.filter(post => String(post.id) !== String(postId));
                }

                // 4. Güncel listeyi kaydet
                localStorage.setItem('posts_db', JSON.stringify(newPosts));

                // 5. Profil sayfasındaki "Silinenler" listesine de ekleyelim ki oradan da kalksın
                let deletedIDs = JSON.parse(localStorage.getItem('deleted_ids_db')) || [];
                if (!deletedIDs.includes(postId)) {
                    deletedIDs.push(postId);
                    localStorage.setItem('deleted_ids_db', JSON.stringify(deletedIDs));
                }

                // 6. Sayfayı yenile (En temiz çözüm)
                window.location.reload();
            }
        }

        // --- 3. LIKE FUNCTION ---
        window.toggleLike = function (postId) {
            let posts = JSON.parse(localStorage.getItem('posts_db')) || [];
            let postIndex = posts.findIndex(p => p.id === postId);

            if (postIndex > -1) {
                let post = posts[postIndex];
                if (!post.likesList) post.likesList = [];

                const myIndex = post.likesList.indexOf('me');

                if (myIndex === -1) {
                    post.likesList.push('me'); // Like
                    post.likes++;
                } else {
                    post.likesList.splice(myIndex, 1); // Unlike
                    post.likes--;
                }

                posts[postIndex] = post;
                localStorage.setItem('posts_db', JSON.stringify(posts));
                renderFeed();
            }
        }

        // --- 4. SAVE FUNCTION ---
        window.toggleSave = function (postId) {
            let saved = JSON.parse(localStorage.getItem('saved_db')) || [];
            const index = saved.indexOf(postId);

            if (index === -1) {
                saved.push(postId); // Add to saved
            } else {
                saved.splice(index, 1); // Remove from saved
            }

            localStorage.setItem('saved_db', JSON.stringify(saved));
            renderFeed();
        }

        // --- 5. COMMENT FUNCTION ---
        window.addComment = function (postId) {
            const input = document.getElementById(`input-${postId}`);
            const text = input.value.trim();

            if (!text) return;

            let posts = JSON.parse(localStorage.getItem('posts_db')) || [];
            let postIndex = posts.findIndex(p => p.id === postId);

            if (postIndex > -1) {
                let post = posts[postIndex];
                if (!post.comments) post.comments = [];

                post.comments.push({
                    user: 'kodinnggg',
                    text: text
                });

                posts[postIndex] = post;
                localStorage.setItem('posts_db', JSON.stringify(posts));

                input.value = "";
                renderFeed();
            }
        }

        window.focusComment = function (postId) {
            document.getElementById(`input-${postId}`).focus();
        }

        // --- 6. SHARE FUNCTION ---
        window.sharePost = function (postId) {
            alert("Post sent to friends! ✈️");
        }

    </script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // 1. Yeni atılan storyleri hafızadan çek
            const localStories = JSON.parse(localStorage.getItem('stories_db')) || [];

            // 2. Senin HTML'indeki story şeridini bul
            const storyBar = document.querySelector('.status-wrapper');

            if (storyBar && localStories.length > 0) {
                localStories.forEach(story => {

                    // A) story.js içindeki veritabanına bu yeni kişiyi KAYDET
                    // (Böylece openStory fonksiyonun "Bu kim?" demez, açar)
                    if (typeof storyDatabase !== 'undefined') {
                        storyDatabase[story.id] = {
                            storyImg: story.img,       // Paylaşılan resim
                            profileImg: story.user.pic, // Profil resmi
                            username: story.user.name,  // Kullanıcı adı
                            profileUrl: "profil.html"   // Tıklayınca gideceği yer
                        };
                    }

                    // B) HTML Kutusunu oluştur (Senin tasarımınla BİREBİR AYNI)
                    // "status-card" ve "profile-pic" classlarını aynen kullandık
                    const newStoryHTML = `
                    <div class="status-card" onclick="openStory('${story.id}')">
                        <div class="profile-pic">
                            <img src="${story.user.pic}" alt="${story.user.name}">
                        </div>
                        <p class="username">${story.user.name}</p>
                    </div>
                    `;

                    // C) Bara ekle: "Your Story" butonunun hemen sağına (En başa)
                    const addStoryBtn = storyBar.firstElementChild; // İlk elemanı (Add Story) bul

                    if (addStoryBtn) {
                        // Eğer Add Story butonu varsa, onun hemen sonrasına ekle
                        addStoryBtn.insertAdjacentHTML('afterend', newStoryHTML);
                    } else {
                        // Eğer buton yoksa listenin en başına ekle
                        storyBar.insertAdjacentHTML('afterbegin', newStoryHTML);
                    }
                });
            }
        });
    </script>

                },
                {

                    user: { name: "scarlett_anderson", pic: "asset/scarlett/1 (7).jpg" },
                    img: "asset/scarlett/1 (6).jpg",
                    likes: 2100,
                    caption: "Dance like nobody's watching 💃",
                    time: "1 DAY AGO",
                    comments: []
                },
                {
                    id: 304,
                    user: { name: "jameshill", pic: "asset/james/1.jpg" },
                    img: "asset/james/5.jpg",
                    likes: 3100,
                    caption: "Late night sketches. Big things coming.",
                    time: "1 DAY AGO",
                    comments: [{ user: "scarlett_anderson", text: "Can't wait to see!" }]
                },
                {
                    id: 406,
                    user: { name: "kayra_gultekin", pic: "asset/kayra/a (5).jpg" },
                    img: "asset/kayra/a (4).jpg",
                    likes: 5632,
                    caption: "Team dinner! Good vibes only.",
                    time: "2 DAYS AGO",
                    comments: []
                }
            ];

            // 2. VERİTABANI SENKRONİZASYONU (En Önemli Kısım)
            // LocalStorage'daki 'posts_db'yi çekiyoruz.
            let localPosts = JSON.parse(localStorage.getItem('posts_db')) || [];

            // Eğer LocalStorage boşsa veya bu postlar eksikse, varsayılanları ekle
            defaultHomePosts.forEach(defaultPost => {
                const exists = localPosts.some(p => p.id === defaultPost.id);
                if (!exists) {
                    // Veritabanı formatına uygun hale getirip ekle
                    localPosts.push({
                        id: defaultPost.id,
                        img: defaultPost.img,
                        likes: defaultPost.likes,
                        comments: defaultPost.comments,
                        user: defaultPost.user, // Kullanıcı bilgisini sakla
                        desc: defaultPost.caption, // Açıklamayı sakla
                        time: defaultPost.time
                    });
                }
            });
            // Güncel listeyi geri kaydet
            localStorage.setItem('posts_db', JSON.stringify(localPosts));

            // 3. EKRANA BASILACAK LİSTEYİ HAZIRLA
            // --- DEĞİŞİKLİK BURADA YAPILDI ---
            // Eskiden burada "targetIDs" ile filtreleme vardı, bu yüzden senin yeni postların görünmüyordu.
            // Şimdi "localPosts" içindeki TÜM veriyi (senin attıkların dahil) alıyoruz.

            let feedData = localPosts;

            // Karıştır (Her yenilemede farklı sıralama)
            feedData.reverse();

            // Kaydedilenler Listesini Çek (İkonun dolu/boş olması için)
            const savedList = JSON.parse(localStorage.getItem('saved_db')) || [];

            // 4. POSTLARI DOM'A EKLE
            feedContainer.innerHTML = "";

            feedData.forEach(post => {
                // Yorumları HTML'e çevir
                let commentsHTML = "";
                if (post.comments) {
                    post.comments.forEach(c => {
                        commentsHTML += `<div style="margin-bottom: 4px; font-size: 14px;"><span style="font-weight: 600; margin-right: 5px;">${c.user}</span>${c.text}</div>`;
                    });
                }

                // Kullanıcı adı ve resim kontrolü (Eski verilerde eksik olabilir diye)
                const uName = post.user ? post.user.name : "user";
                const uPic = post.user ? post.user.pic : "asset/image/5.jpg";
                const uDesc = post.desc || "";
                const uTime = post.time || "JUST NOW";

                // Kaydedildi mi kontrolü
                const isSaved = savedList.includes(post.id);
                const saveIconClass = isSaved ? "fa-solid" : "fa-regular"; // Dolu veya Boş ikon

                const postHTML = `
                <div class="post-card" id="home-post-${post.id}" style="background:white; border:1px solid #dbdbdb; border-radius:3px; margin-bottom:15px; max-width:470px; margin-left:auto; margin-right:auto;">
                    
                    <div class="post-header" style="display:flex; align-items:center; padding:10px;">
                        <a href="${getProfileLink(uName)}" style="display:flex; align-items:center; text-decoration:none; color:black;">
                            <img src="${uPic}" style="width:32px; height:32px; border-radius:50%; margin-right:10px; object-fit:cover; border:1px solid #efefef;">
                            <span style="font-weight:600; font-size:14px;">${uName}</span>
                        </a>
                        <i class="fa-solid fa-ellipsis" style="margin-left:auto; cursor:pointer;"></i>
                    </div>

                    <div class="post-image">
                        <img src="${post.img}" style="width:100%; display:block;" ondblclick="likeAnimation(this)">
                    </div>

                    <div class="post-content" style="padding:10px;">
                        <div style="display:flex; justify-content:space-between; font-size:24px; margin-bottom:10px;">
                            <div style="display:flex; gap:15px;">
                                <i class="fa-regular fa-heart" onclick="toggleHomeLike(this)" style="cursor:pointer;"></i>
                                <i class="fa-regular fa-comment" onclick="focusHomeComment('${post.id}')" style="cursor:pointer;"></i>
                                <i class="fa-regular fa-paper-plane" onclick="window.location.href='dm.html'" style="cursor:pointer;"></i>
                            </div>
                            <div>
                                <i class="${saveIconClass} fa-bookmark" onclick="toggleHomeSave(this, ${post.id})" style="cursor:pointer;"></i>
                            </div>
                        </div>

                        <div style="font-weight:600; font-size:14px; margin-bottom:5px;">
                            ${(post.likes || 0).toLocaleString()} likes
                        </div>

                        <div style="font-size:14px; margin-bottom:5px;">
                            <span style="font-weight:600; margin-right:5px;">${uName}</span>
                            ${uDesc}
                        </div>

                        <div style="color:#8e8e8e; font-size:14px; cursor:pointer; margin-bottom:5px;">
                            View all comments
                        </div>
                        
                        <div id="home-comments-${post.id}">
                            ${commentsHTML}
                        </div>

                        <div style="color:#8e8e8e; font-size:10px; margin-top:5px; text-transform:uppercase;">
                            ${uTime}
                        </div>

                        <div style="border-top:1px solid #efefef; margin-top:10px; padding-top:10px; display:flex;">
                            <i class="fa-regular fa-face-smile" style="font-size:24px; margin-right:10px;"></i>
                            <input type="text" id="input-home-${post.id}" placeholder="Add a comment..." style="border:none; width:100%; outline:none; font-size:14px;">
                            <button onclick="postHomeComment(${post.id})" style="border:none; background:none; color:#0095f6; font-weight:600; cursor:pointer;">Post</button>
                        </div>
                    </div>
                </div>
                `;

                feedContainer.insertAdjacentHTML('afterend', postHTML);
            });
        });

        // --- YARDIMCI FONKSİYONLAR ---

        function getProfileLink(username) {
            if (username === 'scarlett_anderson') return 'scarlett.html';
            if (username === 'jameshill') return 'james.html';
            if (username === 'kayra_gultekin') return 'kayra.html';
            return '#'; // Kendi profilin veya boş
        }

        // 1. BEĞENİ (Görsel)
        function toggleHomeLike(btn) {
            if (btn.classList.contains('fa-regular')) {
                btn.classList.remove('fa-regular');
                btn.classList.add('fa-solid');
                btn.style.color = '#ed4956';
                btn.style.transform = 'scale(1.2)';
                setTimeout(() => btn.style.transform = 'scale(1)', 200);
            } else {
                btn.classList.remove('fa-solid');
                btn.classList.add('fa-regular');
                btn.style.color = 'black';
            }
        }

        // 2. KAYDETME (DATABASE ENTEGRASYONLU)
        function toggleHomeSave(btn, postId) {
            // A) LocalStorage'dan kayıtlı listeyi çek
            let savedList = JSON.parse(localStorage.getItem('saved_db')) || [];

            // B) Kontrol et: Zaten kayıtlı mı?
            const index = savedList.indexOf(postId);

            if (index === -1) {
                // Kayıtlı değilse -> EKLE
                savedList.push(postId);
                btn.classList.remove('fa-regular');
                btn.classList.add('fa-solid');
            } else {
                // Kayıtlıysa -> SİL
                savedList.splice(index, 1);
                btn.classList.remove('fa-solid');
                btn.classList.add('fa-regular');
            }

            // C) Güncel listeyi geri kaydet
            localStorage.setItem('saved_db', JSON.stringify(savedList));

            console.log("Kaydedilenler güncellendi:", savedList);
        }

        // 3. ODAKLANMA
        function focusHomeComment(id) {
            document.getElementById(`input-home-${id}`).focus();
        }

        // 4. YORUM YAPMA (DATABASE ENTEGRASYONLU)
        function postHomeComment(postId) {
            const input = document.getElementById(`input-home-${postId}`);
            const text = input.value.trim();
            const commentsArea = document.getElementById(`home-comments-${postId}`);

            if (text !== "") {
                // A) LocalStorage'daki postları çek
                let localPosts = JSON.parse(localStorage.getItem('posts_db')) || [];

                // B) İlgili postu bul
                let postIndex = localPosts.findIndex(p => p.id === postId);

                if (postIndex > -1) {
                    // C) Yorum objesini oluştur
                    const newComment = {
                        user: "Emre Çelik", // Giriş yapmış kullanıcı adın
                        text: text
                    };

                    // D) Postun yorumlarına ekle
                    if (!localPosts[postIndex].comments) localPosts[postIndex].comments = [];
                    localPosts[postIndex].comments.push(newComment);

                    // E) Veritabanını güncelle
                    localStorage.setItem('posts_db', JSON.stringify(localPosts));

                    // F) Ekrana hemen bas (Sayfayı yenilemeye gerek kalmasın)
                    const newCommentHTML = `
                        <div style="margin-bottom: 4px; font-size: 14px;">
                            <span style="font-weight: 600; margin-right: 5px;">Emre Çelik</span>
                            ${text}
                        </div>`;
                    commentsArea.insertAdjacentHTML('beforeend', newCommentHTML);

                    input.value = ""; // Inputu temizle
                }
            }
        }

        function likeAnimation(img) {
            const likeBtn = img.closest('.post-card').querySelector('.fa-heart');
            if (likeBtn.classList.contains('fa-regular')) {
                toggleHomeLike(likeBtn);
            }
        }
    </script>

    <script>
        // --- 1. AKILLI BEĞENİ FONKSİYONU (HTML DEĞİŞİKLİĞİ GEREKTİRMEZ) ---
        function toggleHomeLike(btn) {
            // 1. Tıklanan butonun içinde olduğu Post Kartını buluyoruz
            const card = btn.closest('.post-card');

            // 2. Kartın ID'sinden (örn: home-post-201) sadece sayıyı alıyoruz
            const postId = card.id.replace('home-post-', '');

            // 3. Veritabanını çekiyoruz
            let posts = JSON.parse(localStorage.getItem('posts_db')) || [];
            // "==" kullanıyoruz ki yazı/sayı fark etmesin
            let postIndex = posts.findIndex(p => p.id == postId);

            if (postIndex > -1) {
                let post = posts[postIndex];
                if (!post.likesList) post.likesList = [];
                if (!post.likes) post.likes = 0;

                const myIndex = post.likesList.indexOf('me');

                // Görsel İşlemler (Sadece İkonu ve Sayıyı Güncelle)
                if (btn.classList.contains('fa-regular')) {
                    // BEĞENME
                    btn.classList.remove('fa-regular');
                    btn.classList.add('fa-solid');
                    btn.style.color = '#ed4956';
                    btn.style.transform = 'scale(1.2)';
                    setTimeout(() => btn.style.transform = 'scale(1)', 200);

                    post.likesList.push('me');
                    post.likes++;
                } else {
                    // GERİ ALMA
                    btn.classList.remove('fa-solid');
                    btn.classList.add('fa-regular');
                    btn.style.color = 'black';

                    if (myIndex > -1) post.likesList.splice(myIndex, 1);
                    if (post.likes > 0) post.likes--;
                }

                // --- KRİTİK NOKTA: SAYIYI GÜNCELLEME ---
                // HTML değiştirmeden, butonun olduğu kutudaki "likes" yazısını bulup değiştiriyoruz.
                // Yapı: .post-content > (ikonlar satırı) > (beğeni sayısı satırı)
                const contentDiv = card.querySelector('.post-content');
                // post-content içindeki 2. div (index 1) beğeni sayısını tutuyor
                const likeCountDiv = contentDiv.children[1];

                if (likeCountDiv) {
                    likeCountDiv.innerHTML = `${post.likes.toLocaleString()} likes`;
                    likeCountDiv.style.fontWeight = "600"; 
                }

                // 4. Veritabanına Kaydet
                posts[postIndex] = post;
                localStorage.setItem('posts_db', JSON.stringify(posts));
            }
        }

        // --- 2. AKILLI YORUM FONKSİYONU ---
        function postHomeComment(postId) {
            // HTML yapısında ID postHomeComment'e gönderiliyor, o yüzden direkt kullanabiliriz.
            const input = document.getElementById(`input-home-${postId}`);
            const text = input.value.trim();
            const commentsArea = document.getElementById(`home-comments-${postId}`);

            if (text !== "") {
                let posts = JSON.parse(localStorage.getItem('posts_db')) || [];
                let postIndex = posts.findIndex(p => p.id == postId);

                if (postIndex > -1) {
                    const newComment = {
                        user: "Emre Çelik", // Veya giriş yapan kullanıcı
                        text: text
                    };

                    if (!posts[postIndex].comments) posts[postIndex].comments = [];
                    posts[postIndex].comments.push(newComment);
                    localStorage.setItem('posts_db', JSON.stringify(posts));

                    // HTML Ekle
                    const newCommentHTML = `
                        <div style="margin-bottom: 4px; font-size: 14px;">
                            <span style="font-weight: 600; margin-right: 5px;">Emre Çelik</span>
                            ${text}
                        </div>`;

                    commentsArea.insertAdjacentHTML('beforeend', newCommentHTML);
                    input.value = "";
                }
            }
        }

        // --- 3. ÇİFT TIKLAMA ANİMASYONU ---
        function likeAnimation(img) {
            // HTML yapısında onclick olmadığı için ID gelmeyebilir, parent'tan buluyoruz.
            const card = img.closest('.post-card');
            const likeBtn = card.querySelector('.fa-heart');

            // Sadece beğenilmemişse beğen (zaten beğenildiyse geri alma)
            if (likeBtn.classList.contains('fa-regular')) {
                toggleHomeLike(likeBtn);
            }

        }

        function toggleHomeSave(btn, postId) {
            let saved = JSON.parse(localStorage.getItem('saved_db')) || [];
            const index = saved.indexOf(postId);
            if (index === -1) {
                saved.push(postId);
                btn.classList.remove('fa-regular'); btn.classList.add('fa-solid');
            } else {
                saved.splice(index, 1);
                btn.classList.remove('fa-solid'); btn.classList.add('fa-regular');
            }
            localStorage.setItem('saved_db', JSON.stringify(saved));
        }

        function focusHomeComment(id) {
            const input = document.getElementById(`input-home-${id}`);
            if (input) input.focus();
        }

        window.deletePost = function (postId) {
            if (confirm("Bu gönderiyi silmek istediğine emin misin?")) {
                let posts = JSON.parse(localStorage.getItem('posts_db')) || [];
                let newPosts = posts.filter(post => post.id != postId); // '!=' kullandık
                localStorage.setItem('posts_db', JSON.stringify(newPosts));

                // Profildeki silinenler listesi için
                let deletedIDs = JSON.parse(localStorage.getItem('deleted_ids_db')) || [];
                if (!deletedIDs.includes(postId)) {
                    deletedIDs.push(postId);
                    localStorage.setItem('deleted_ids_db', JSON.stringify(deletedIDs));
                }
                window.location.reload();
            }
        }
    </script>
